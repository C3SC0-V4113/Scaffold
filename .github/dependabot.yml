# Dependabot keeps the purrfold CLI's own dependencies current. It opens one PR
# per update so each bump can be reviewed and run through `npm run check` before
# merging.
#
# NOTE: the versions purrfold pins for the apps it *generates* live in
# src/versions.json (imported by src/installers/config-model.ts and the E2E
# harness). Dependabot cannot see those — they are handled by Renovate via the
# custom regex manager in renovate.json, and every bump PR is validated by the
# full E2E matrix (.github/workflows/e2e.yml). Division of labor: Dependabot
# owns package.json + GitHub Actions; Renovate owns src/versions.json only.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
